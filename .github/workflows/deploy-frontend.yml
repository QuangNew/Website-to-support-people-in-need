name: Deploy Frontend → Azure Static Web Apps
run-name: Frontend deploy • ${{ github.ref_name }} • ${{ github.event_name }}

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - '.github/workflows/deploy-frontend.yml'
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - 'client/**'

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Install dependencies
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Build for production
        working-directory: client
        run: pnpm build
        env:
          # These are already in .env.production committed to the repo.
          # Override here only if you need to inject secrets at build time.
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          # Vite outputs to client/dist
          app_location: 'client/dist'
          # Compiled output — skip SWA's own build step
          skip_app_build: true
          output_location: ''

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "## Frontend deployed"
            echo ""
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Branch: \`${GITHUB_REF_NAME}\`"
            echo "- Trigger: \`${GITHUB_EVENT_NAME}\`"
            echo "- Upload: \`client/dist\` → Azure Static Web Apps"
            echo ""
            echo "Redeploy cùng code: Actions → Deploy Frontend → Run workflow."
          } >> "$GITHUB_STEP_SUMMARY"

  preview_pull_request:
    name: Preview Frontend PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action != 'closed'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10'

      - name: Install dependencies
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Build for production
        working-directory: client
        run: pnpm build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy preview to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'client/dist'
          skip_app_build: true
          output_location: ''

      - name: Write preview summary
        shell: bash
        run: |
          {
            echo "## Frontend preview deployed"
            echo ""
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Branch: \`${GITHUB_HEAD_REF}\`"
            echo "- Trigger: \`pull_request\`"
            echo "- Upload: \`client/dist\` → Azure Static Web Apps preview"
          } >> "$GITHUB_STEP_SUMMARY"

  close_pull_request:
    name: Close PR Preview Environment
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'closed'

    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          app_location: 'client'
          action: 'close'
