version: 2

multi-ecosystem-groups:
  all-dependencies:
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"

updates:
  - package-ecosystem: "npm"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    open-pull-requests-limit: 1
    cooldown:
      default-days: 5
      semver-major-days: 21
      semver-minor-days: 7
      semver-patch-days: 3
    rebase-strategy: "disabled"
    labels:
      - "dependencies"
      - "tooling"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"

  - package-ecosystem: "npm"
    directory: "/client"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    open-pull-requests-limit: 1
    cooldown:
      default-days: 5
      semver-major-days: 21
      semver-minor-days: 7
      semver-patch-days: 3
    rebase-strategy: "disabled"
    labels:
      - "dependencies"
      - "frontend"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"

  - package-ecosystem: "nuget"
    directories:
      - "/src/ReliefConnect.API"
      - "/src/ReliefConnect.Core"
      - "/src/ReliefConnect.Infrastructure"
      - "/src/ReliefConnect.Tests"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    open-pull-requests-limit: 1
    cooldown:
      default-days: 3
      semver-major-days: 14
      semver-minor-days: 5
      semver-patch-days: 2
    rebase-strategy: "disabled"
    labels:
      - "dependencies"
      - "backend"
      - "dotnet"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "github-actions"
    directory: "/"
    patterns:
      - "*"
    multi-ecosystem-group: "all-dependencies"
    open-pull-requests-limit: 1
    cooldown:
      default-days: 2
    rebase-strategy: "disabled"
    labels:
      - "dependencies"
      - "ci"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
