  - package-ecosystem: "nuget"
    directory: "/src/ReliefConnect.Tests"
    target-branch: "temp"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
